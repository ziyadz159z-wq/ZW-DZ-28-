<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZW28DZ</title>
<style>
body, html {
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
    overflow-x: hidden;
}

/* فيديو الخلفية */
.video-bg {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -1;
}

/* عنوان الموقع */
.logo {
    position: absolute;
    top: 20px;
    right: 20px;
    font-size: 28px;
    font-weight: bold;
    background: linear-gradient(45deg, red, orange, yellow, green, blue, purple);
    -webkit-background-clip: text;
    color: transparent;
    animation: glow 5s linear infinite;
}

@keyframes glow {
    0% {filter: hue-rotate(0deg);}    
    100% {filter: hue-rotate(360deg);} 
}

/* النص الرئيسي */
.main-text {
    text-align: center;
    color: white;
    font-size: 48px;
    margin-top: 200px;
    font-weight: bold;
}

/* زر البداية */
.start-btn {
    display: block;
    margin: 50px auto;
    padding: 20px 50px;
    font-size: 24px;
    border: none;
    cursor: pointer;
    border-radius: 10px;
    background: linear-gradient(90deg, red, orange, yellow, green, blue, purple);
    color: white;
    animation: glow 5s linear infinite;
}

/* قسم السوشيال */
.section {
    padding: 100px 20px;
    background: #111;
    text-align: center;
}

.social-box {
    margin: 30px auto;
    max-width: 400px;
}

.social-box img {
    width: 100%;
    border-radius: 10px;
}

.follow-btn {
    margin-top: 10px;
    padding: 15px;
    border: none;
    width: 100%;
    font-size: 18px;
    cursor: pointer;
    border-radius: 8px;
}

.instagram {background: #E1306C; color: white;}
.facebook {background: #3b5998; color: white;}
.telegram {background: #0088cc; color: white;}
.discord {background: #5865F2; color: white;}
.gmail {background: #D44638; color: white;}

/* نافذة منبثقة */
.popup {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: #222;
    color: white;
    padding: 30px;
    border-radius: 10px;
    z-index: 999;
}

.support-btn {
    position: fixed;
    top: 20px;
    left: 20px;
    background: gray;
    color: white;
    padding: 10px 20px;
    border: none;
    cursor: pointer;
}
</style>
</head>

<body>

<video class="video-bg" autoplay muted loop>
    <source src="https://cdn.coverr.co/videos/coverr-ocean-waves-1600.mp4" type="video/mp4">
</video>

<div class="logo">ZW28DZ.com</div>

<div class="main-text">مــــرحــــبــــا بــك فــي مـــوقــعـــنــا</div>

<button class="start-btn" onclick="goToShop()">ابــدا الان</button>

<button class="support-btn" onclick="contactSupport()">الدعم والمساعدة</button>

<div class="section">

<div class="social-box">
<img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png">
<button class="follow-btn instagram" onclick="window.open('https://www.instagram.com/wassim_donx_12?utm_source=ig_web_button_share_sheet&igsh=ZDNlZDc0MzIxNw==')">تابعنا</button>
</div>

<div class="social-box">
<img src="https://upload.wikimedia.org/wikipedia/commons/5/51/Facebook_f_logo_%282019%29.svg">
<button class="follow-btn facebook" onclick="notAvailable()">تابعنا</button>
</div>

<div class="social-box">
<img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg">
<button class="follow-btn telegram" onclick="notAvailable()">تابعنا</button>
</div>

<div class="social-box">
<img src="https://upload.wikimedia.org/wikipedia/commons/9/98/Discord_logo.svg">
<button class="follow-btn discord" onclick="notAvailable()">تابعنا</button>
</div>

<div class="social-box">
<img src="https://upload.wikimedia.org/wikipedia/commons/4/4e/Gmail_Icon.png">
<button class="follow-btn gmail" onclick="notAvailable()">تابعنا</button>
</div>

</div>

<div class="popup" id="popup">للأسف لم يتم إنشاء الحساب بعد من قبل صاحب الموقع</div>

<script>
function notAvailable() {
    let p = document.getElementById('popup');
    p.style.display = 'block';
    setTimeout(()=> p.style.display='none', 3000);
}

function contactSupport() {
    window.location.href = "mailto:ziyadz159z@gmail.com";
}

function goToShop() {
    alert("سيتم تحويلك إلى صفحة المتجر قريباً");
}
</script>

</body>
</html>
